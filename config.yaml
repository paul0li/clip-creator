whisper:
  mode: local          # "local" or "api"
  model: large-v3        # tiny/base/small/medium/large-v3
  language: es

intro:
  reference_path: assets/intro.mp3
  threshold: 0.6

jingle:
  reference_path: assets/jingle_reference.wav
  threshold: 0.6

llm:
  provider: openai     # "anthropic" or "openai"
  model: gpt-4o-mini
  temperature: 0.3

segments:
  count: 3
  min_seconds: 25
  max_seconds: 40
